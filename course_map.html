                  nodes = new vis.DataSet([{"color": "#184073", "font": {"color": "#333"}, "id": "DSC 10", "label": "DSC 10", "shape": "dot", "size": 25, "title": "This first course in data science introduces students to data exploration, statistical inference, and prediction. It introduces the Python programming language as a tool for tabular data manipulation, visualization, and simulation. Through homework assignments and projects, students are given an opportunity to develop their analytical skills while working with real-world datasets from a variety of domains. Prerequisites: none."}, {"color": "#184073", "font": {"color": "#333"}, "id": "DSC 20", "label": "DSC 20", "shape": "dot", "size": 25, "title": "Provides an understanding of the structures that underlie the programs, algorithms, and languages used in data science by expanding the repertoire of computational concepts introduced in DSC 10/R and exposing students to techniques of abstraction. Course will be taught in Python and will cover topics including recursion, higher-order functions, function composition, object-oriented programming, interpreters, classes, and simple data structures such as arrays, lists, and linked lists. Prerequisites: DSC 10/R. Restricted to students within the DS25 major. All other students will be allowed as space permits."}, {"color": "#184073", "font": {"color": "#333"}, "id": "DSC 30", "label": "DSC 30", "shape": "dot", "size": 25, "title": "Builds on topics covered in DSC 20/R and provides practical experience in composing larger computational systems through several significant programming projects using Java. Students will study advanced programming techniques including encapsulation, abstract data types, interfaces, algorithms and complexity, and data structures such as stacks, queues, priority queues, heaps, linked lists, binary trees, binary search trees, and hash tables. Prerequisites: DSC 20/R. Restricted to students within the DS25 major. All other students will be allowed as space permits."}, {"color": "#184073", "font": {"color": "#333"}, "id": "DSC 40A", "label": "DSC 40A", "shape": "dot", "size": 25, "title": "The sequence DSC 40A/R-B/R introduces the theoretical foundations of data science. DSC 40A/R, the first course in the sequence, exposes students to the mathematical theory underlying fundamental topics in machine learning. Topics include empirical risk minimization, optimization, regression, classification, and discrete probability. Students practice creative problem-solving while learning how to rigorously justify and communicate mathematical ideas. Prerequisites: DSC 10/R, (MATH 20C or MATH 31BH) and (MATH 18 or MATH 20F or MATH 31AH). Restricted to students within the DS25 major. All other students will be allowed as space permits."}, {"color": "#184073", "font": {"color": "#333"}, "id": "DSC 40B", "label": "DSC 40B", "shape": "dot", "size": 25, "title": "The marriage of data, computation, and inferential thinking, or \u201cdata science,\u201d is redefining how people and organizations solve challenging problems and understand the world. This course bridges lower- and upper-division data science courses as well as methods courses in other fields. Students master the data science life-cycle and learn many of the fundamental principles and techniques of data science spanning algorithms, statistics, machine learning, visualization, and data systems. Prerequisites: DSC 30/R and DSC 40A/R. Restricted to students within the DS25 major. All other students will be allowed as space permits."}, {"color": "#184073", "font": {"color": "#333"}, "id": "DSC 80", "label": "DSC 80", "shape": "dot", "size": 25, "title": "Students will learn about a variety of topics in data science through interactive presentations from faculty and industry professionals.\u00a0May be taken for credit up to four times.\u00a0Prerequisites:\u00a0DSC 10. Restricted to students within the DS25 major. All other students will be allowed as space permits."}
